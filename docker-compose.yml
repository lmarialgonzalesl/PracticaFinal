services:

  mlg-backend:
    build: ./backend/api
    container_name: mlg-backend
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mlg-postgis
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 123456
      DB_NAME: gisdb
    depends_on:
      - mlg-postgis

  mlg-frontend:
    build: ./visor-mapas
    container_name: mlg-frontend
    ports:
      - "4200:80"
    depends_on:
      - mlg-backend

  mlg-geoserver:
    image: kartoza/geoserver
    container_name: mlg-geoserver
    ports:
      - "8080:8080"
    environment:
      - GEOSERVER_ADMIN_USER=admin
      - GEOSERVER_ADMIN_PASSWORD=geoserver
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
  mlg-postgis:
    image: postgis/postgis:15-3.3
    container_name: mlg-postgis
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: gisdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    volumes:
      - postgis_data:/var/lib/postgresql/data

volumes:
  geoserver_data:
  postgis_data: